name: Build and Release Lingqiao

on:
  push:
    tags:
      - 'v*.*.*'  # Trigger on version tags like v3.0.0
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g. 3.0.0)'
        required: true
        default: '3.0.0'

jobs:
  build-and-package:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Get Version
      id: get_version
      shell: pwsh
      run: |
        $version = "${{ github.event.inputs.version }}"
        if (-not $version) {
          $version = "${{ github.ref_name }}".TrimStart('v')
        }
        echo "VERSION=$version" >> $env:GITHUB_ENV
        echo "Version is $version"

    - name: Install Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: '5.15.2'
        arch: 'win32_msvc2019'
        dir: '${{ github.workspace }}\Qt'

    - name: Install WiX Toolset v4
      shell: pwsh
      run: |
        dotnet tool install --global wix
        wix extension add WixToolset.Bal.wixext

    - name: Configure CMake
      shell: pwsh
      run: |
        cmake -S . -B build-release -G "Visual Studio 17 2022" -A Win32 -DCMAKE_PREFIX_PATH="${{ env.Qt5_DIR }}" -DAPP_VERSION="${{ env.VERSION }}"

    - name: Build Application
      shell: pwsh
      run: |
        cmake --build build-release --config Release

    - name: Collect Qt Dependencies (windeployqt)
      shell: pwsh
      run: |
        $windeployqt = Join-Path "${{ env.Qt5_DIR }}" "bin\windeployqt.exe"
        $exePath = "build-release\src\Release\CX_LingQiao.exe"
        & $windeployqt --no-translations --no-opengl-sw --release $exePath

    - name: Build MSI (WiX)
      shell: pwsh
      run: |
        $version = "${{ env.VERSION }}"
        $sourceDir = Resolve-Path "build-release\src\Release"
        $outDir = "dist\installer"
        New-Item -ItemType Directory -Force -Path $outDir
        
        Write-Host "Building MSI..."
        wix build "installer\Product.wxs" -d "ProductVersion=$version" -d "SourceDir=$sourceDir" -o "$outDir\Lingqiao-$version.msi"

    - name: Build Burn Bundle (WiX)
      shell: pwsh
      run: |
        $version = "${{ env.VERSION }}"
        $msiPath = Resolve-Path "dist\installer\Lingqiao-$version.msi"
        $outDir = "dist\installer"
        
        Write-Host "Building Bootstrapper (Bundle)..."
        wix build "installer\Bundle.wxs" -ext WixToolset.Bal.wixext -d "ProductVersion=$version" -d "MsiPath=$msiPath" -o "$outDir\LingqiaoSetup-$version.exe"

    - name: Upload Artifacts
      uses: actions/upload-artifact@v3
      with:
        name: Lingqiao-Installers
        path: dist\installer\*

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: dist/installer/*
        name: Release ${{ env.VERSION }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
