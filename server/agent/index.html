<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>灵桥 代理后台</title>
<style>
:root {
  --bg: #0a0e14;
  --bg-gradient: radial-gradient(ellipse at 20% 50%, rgba(16,185,129,0.06) 0%, transparent 50%),
                 radial-gradient(ellipse at 80% 20%, rgba(59,130,246,0.05) 0%, transparent 50%),
                 radial-gradient(ellipse at 50% 80%, rgba(139,92,246,0.04) 0%, transparent 50%);
  --surface: rgba(17,23,32,0.75);
  --surface-solid: #111720;
  --surface-2: rgba(22,29,40,0.8);
  --glass: rgba(255,255,255,0.03);
  --glass-border: rgba(255,255,255,0.06);
  --accent: #10b981;
  --accent-hover: #34d399;
  --accent-dim: rgba(16,185,129,0.12);
  --danger: #ef4444;
  --danger-hover: #f87171;
  --danger-dim: rgba(239,68,68,0.12);
  --success: #10b981;
  --success-dim: rgba(16,185,129,0.12);
  --warning: #f59e0b;
  --warning-dim: rgba(245,158,11,0.12);
  --blue: #3b82f6;
  --blue-dim: rgba(59,130,246,0.12);
  --purple: #8b5cf6;
  --text: #e2e8f0;
  --text-2: #94a3b8;
  --text-3: #64748b;
  --border: rgba(255,255,255,0.06);
  --border-light: rgba(255,255,255,0.1);
  --radius: 10px;
  --radius-lg: 14px;
  --radius-xl: 18px;
  --shadow: 0 4px 24px rgba(0,0,0,0.25);
  --shadow-lg: 0 8px 40px rgba(0,0,0,0.35);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, 'SF Pro Display', 'Segoe UI', 'Microsoft YaHei', system-ui, sans-serif;
  background: var(--bg); background-image: var(--bg-gradient); color: var(--text);
  min-height: 100vh; font-size: 14px; line-height: 1.5;
  -webkit-font-smoothing: antialiased; -webkit-tap-highlight-color: transparent;
}
h1,h2,h3 { letter-spacing: -0.3px; }
@keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
@keyframes modalSlide { from { opacity:0; transform:translateY(-16px) scale(0.97); } to { opacity:1; transform:translateY(0) scale(1); } }
@keyframes toastIn { from { opacity:0; transform:translateX(100%) scale(0.9); } to { opacity:1; transform:translateX(0) scale(1); } }
@keyframes pulse { 0%,100% { box-shadow:0 0 0 0 rgba(16,185,129,0.4); } 50% { box-shadow:0 0 0 6px rgba(16,185,129,0); } }
@keyframes shimmer { from { background-position: -200% 0; } to { background-position: 200% 0; } }

.auth-screen { display:flex; align-items:center; justify-content:center; min-height:100vh; flex-direction:column; gap:24px; padding:20px; animation: fadeUp 0.5s ease; }
.auth-brand { font-size:32px; font-weight:800; background:linear-gradient(135deg, var(--accent), var(--blue), var(--purple)); background-size:200% 200%; animation:shimmer 4s ease infinite; -webkit-background-clip:text; -webkit-text-fill-color:transparent; letter-spacing:3px; }
.auth-tabs { display:flex; gap:0; }
.auth-tab { padding:10px 28px; cursor:pointer; color:var(--text-3); font-size:13px; font-weight:600; border-bottom:2px solid transparent; transition:all .2s; background:none; border-top:none; border-left:none; border-right:none; }
.auth-tab.active { color:var(--accent); border-bottom-color:var(--accent); }
.auth-box { background:var(--surface); backdrop-filter:blur(24px) saturate(1.2); -webkit-backdrop-filter:blur(24px) saturate(1.2); padding:36px 32px; border-radius:var(--radius-xl); width:100%; max-width:380px; border:1px solid var(--glass-border); box-shadow:var(--shadow-lg); animation:fadeUp 0.6s ease 0.1s both; }
.auth-box h2 { font-size:18px; margin-bottom:6px; font-weight:700; }
.auth-box p { color:var(--text-2); font-size:12px; margin-bottom:22px; }
.auth-box input { width:100%; padding:12px 14px; border-radius:var(--radius); border:1px solid var(--border); background:rgba(0,0,0,0.2); color:var(--text); font-size:14px; margin-bottom:14px; transition:all .25s; }
.auth-box input:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-dim); }
.auth-error { color:var(--danger); margin-top:12px; text-align:center; display:none; font-size:13px; }

.btn { padding:9px 18px; border:none; border-radius:8px; cursor:pointer; font-size:13px; font-weight:600; transition:all .2s; display:inline-flex; align-items:center; gap:6px; white-space:nowrap; position:relative; overflow:hidden; }
.btn::after { content:''; position:absolute; inset:0; background:linear-gradient(180deg, rgba(255,255,255,0.08) 0%, transparent 100%); opacity:0; transition:opacity .2s; }
.btn:hover::after { opacity:1; }
.btn-primary { background:var(--accent); color:#fff; }
.btn-primary:hover { background:var(--accent-hover); transform:translateY(-1px); box-shadow:0 4px 12px rgba(16,185,129,0.3); }
.btn-ghost { background:var(--glass); color:var(--text); border:1px solid var(--border); backdrop-filter:blur(8px); }
.btn-ghost:hover { background:rgba(255,255,255,0.06); border-color:var(--border-light); }
.btn-sm { padding:6px 12px; font-size:12px; border-radius:6px; }
.btn-block { width:100%; justify-content:center; padding:12px; font-size:14px; }
.btn:disabled { opacity:.4; cursor:not-allowed; pointer-events:none; }

.app { display:none; min-height:100vh; }
.app.show { display:flex; }
.sidebar { width:220px; background:var(--surface-solid); border-right:1px solid var(--border); flex-shrink:0; display:flex; flex-direction:column; position:sticky; top:0; height:100vh; z-index:10; }
.sidebar-brand { padding:20px 20px 14px; border-bottom:1px solid var(--border); }
.sidebar-brand h2 { font-size:17px; background:linear-gradient(135deg, var(--accent), var(--blue)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; font-weight:800; letter-spacing:1.5px; }
.sidebar-brand .ver { font-size:11px; color:var(--text-3); margin-top:2px; }
.sidebar-brand .agent-name { font-size:12px; color:var(--accent); margin-top:4px; font-weight:600; }
.sidebar-nav { flex:1; padding:8px 0; overflow-y:auto; }
.nav-item { padding:10px 20px; cursor:pointer; color:var(--text-2); transition:all .2s; border-left:3px solid transparent; font-size:13px; display:flex; align-items:center; gap:10px; margin:1px 0; }
.nav-item:hover { background:rgba(255,255,255,0.03); color:var(--text); }
.nav-item.active { background:var(--accent-dim); color:var(--accent); border-left-color:var(--accent); }
.nav-item .icon { font-size:15px; width:18px; text-align:center; }
.sidebar-footer { padding:14px 20px; border-top:1px solid var(--border); }
.sidebar-footer .status-dot { display:inline-block; width:8px; height:8px; border-radius:50%; background:var(--success); margin-right:8px; vertical-align:middle; animation:pulse 2s ease infinite; }
.sidebar-footer .status-text { font-size:12px; color:var(--text-2); }
.sidebar-footer .logout { font-size:12px; color:var(--text-3); cursor:pointer; margin-top:8px; display:block; transition:color .2s; }
.sidebar-footer .logout:hover { color:var(--accent); }

.main { flex:1; padding:24px 28px; overflow-y:auto; max-height:100vh; }
.page { display:none; }
.page.active { display:block; animation:fadeUp 0.35s ease; }
.page-header { margin-bottom:24px; }
.page-header h2 { font-size:22px; font-weight:700; letter-spacing:-0.5px; }
.page-header p { color:var(--text-2); font-size:12px; margin-top:3px; }

.stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:14px; margin-bottom:24px; }
.stat-card { background:var(--surface); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); border-radius:var(--radius-lg); padding:18px 20px; border:1px solid var(--glass-border); transition:all .25s; position:relative; overflow:hidden; }
.stat-card::before { content:''; position:absolute; top:0; left:0; right:0; height:1px; background:linear-gradient(90deg, transparent, rgba(255,255,255,0.06), transparent); }
.stat-card:hover { border-color:var(--border-light); transform:translateY(-2px); box-shadow:var(--shadow); }
.stat-card .label { color:var(--text-3); font-size:11px; text-transform:uppercase; letter-spacing:1px; margin-bottom:8px; font-weight:600; }
.stat-card .value { font-size:28px; font-weight:700; letter-spacing:-1px; }
.stat-card .value.accent { color:var(--accent); }
.stat-card .value.success { color:var(--success); }
.stat-card .value.danger { color:var(--danger); }

.table-wrap { overflow-x:auto; background:var(--surface); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); border-radius:var(--radius-lg); border:1px solid var(--glass-border); }
table { width:100%; border-collapse:collapse; }
th,td { padding:10px 14px; text-align:left; border-bottom:1px solid var(--border); }
th { color:var(--text-3); font-size:11px; text-transform:uppercase; letter-spacing:.8px; font-weight:600; background:rgba(0,0,0,0.15); position:sticky; top:0; }
tr:last-child td { border-bottom:none; }
tr:hover td { background:rgba(255,255,255,0.02); }
td { font-size:13px; }
.mono { font-family:'Cascadia Code','JetBrains Mono','Consolas',monospace; font-size:12px; }

.badge { display:inline-flex; align-items:center; gap:5px; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:600; }
.badge::before { content:''; width:6px; height:6px; border-radius:3px; }
.badge-active { background:var(--success-dim); color:var(--success); }
.badge-active::before { background:var(--success); box-shadow:0 0 6px var(--success); }
.badge-disabled { background:var(--danger-dim); color:var(--danger); }
.badge-disabled::before { background:var(--danger); }
.badge-expired { background:rgba(100,116,139,0.12); color:var(--text-3); }
.badge-expired::before { background:var(--text-3); }

.action-bar { display:flex; gap:10px; margin-bottom:16px; align-items:center; flex-wrap:wrap; }
.action-bar input,.action-bar select { padding:8px 12px; border-radius:8px; border:1px solid var(--border); background:rgba(0,0,0,0.2); color:var(--text); font-size:13px; transition:all .25s; font-family:inherit; }
.action-bar input:focus,.action-bar select:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-dim); }
.action-bar .spacer { flex:1; }

.modal-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); align-items:center; justify-content:center; z-index:100; }
.modal-overlay.show { display:flex; }
.modal { background:var(--surface-solid); border-radius:var(--radius-xl); padding:28px; width:calc(100% - 32px); max-width:420px; max-height:85vh; overflow-y:auto; border:1px solid var(--glass-border); box-shadow:var(--shadow-lg); animation:modalSlide 0.3s ease; }
.modal h3 { margin-bottom:20px; font-size:17px; font-weight:700; }
.modal label { display:block; margin-bottom:5px; color:var(--text-2); font-size:12px; font-weight:600; }
.modal input,.modal select { width:100%; padding:10px 12px; margin-bottom:14px; border-radius:8px; border:1px solid var(--border); background:rgba(0,0,0,0.2); color:var(--text); font-size:13px; font-family:inherit; transition:all .25s; }
.modal input:focus,.modal select:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-dim); }
.modal-btns { display:flex; gap:10px; justify-content:flex-end; margin-top:20px; }

.toast { position:fixed; top:20px; right:20px; padding:12px 20px; border-radius:var(--radius); color:white; font-size:13px; font-weight:600; display:none; z-index:200; max-width:360px; box-shadow:var(--shadow-lg); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); }
.toast.show { display:block; animation:toastIn .35s ease; }
.toast.success { background:rgba(16,185,129,0.92); }
.toast.error { background:rgba(239,68,68,0.92); }
.toast.warning { background:rgba(245,158,11,0.92); }
.empty-state { text-align:center; padding:40px 20px; color:var(--text-3); }
.empty-state .icon { font-size:36px; margin-bottom:8px; opacity:0.6; }
.pwd-section { background:var(--surface); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); border:1px solid var(--glass-border); border-radius:var(--radius-lg); padding:20px; max-width:380px; position:relative; overflow:hidden; }
.pwd-section::before { content:''; position:absolute; top:0; left:0; right:0; height:1px; background:linear-gradient(90deg, transparent, rgba(255,255,255,0.06), transparent); }

.mobile-header { display:none; position:fixed; top:0; left:0; right:0; height:48px; background:var(--surface-solid); border-bottom:1px solid var(--border); z-index:50; align-items:center; padding:0 14px; gap:10px; }
.mobile-header .hamburger { width:34px; height:34px; border:none; background:none; color:var(--text); font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; border-radius:8px; }
.mobile-header .hamburger:active { background:var(--accent-dim); }
.mobile-header .title { font-size:14px; font-weight:700; background:linear-gradient(135deg, var(--accent), var(--blue)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.sidebar-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:15; backdrop-filter:blur(2px); }

@media (max-width:768px) {
  .mobile-header { display:flex; }
  .sidebar-overlay.show { display:block; }
  .sidebar { position:fixed; left:-260px; top:0; width:240px; height:100vh; transition:left .3s ease; z-index:20; box-shadow:var(--shadow-lg); }
  .sidebar.open { left:0; }
  .app { padding-top:48px; }
  .main { padding:14px; max-height:calc(100vh - 48px); }
  .stats-grid { grid-template-columns:1fr 1fr; gap:10px; }
  .stat-card { padding:14px; }
  .stat-card .value { font-size:22px; }
  .page-header h2 { font-size:18px; }
  .page-header { margin-bottom:18px; }
  .table-wrap { border-radius:var(--radius); }
  th,td { padding:8px 10px; font-size:12px; }
  .mono { font-size:11px; }
  .action-bar { gap:8px; }
  .action-bar input,.action-bar select { padding:10px 12px; font-size:14px; min-height:40px; }
  .btn { padding:10px 16px; font-size:13px; min-height:40px; }
  .modal { padding:22px; }
  .modal input,.modal select { padding:12px 14px; font-size:14px; }
  .toast { top:56px; right:10px; left:10px; max-width:none; }
  .auth-box { padding:28px 22px; }
  .auth-brand { font-size:26px; }
}
@media (max-width:480px) {
  .stats-grid { grid-template-columns:1fr; }
  .action-bar { flex-direction:column; }
  .action-bar input,.action-bar select { width:100%; }
  .action-bar .spacer { display:none; }
  th:nth-child(n+5), td:nth-child(n+5) { display:none; }
}
</style>
</head>
<body>

<div class="mobile-header" id="mobileHeader">
  <button class="hamburger" onclick="toggleSidebar()">&#9776;</button>
  <span class="title">灵桥 代理后台</span>
</div>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<div class="auth-screen" id="authScreen">
  <div class="auth-brand">LINGQIAO</div>
  <div class="auth-tabs">
    <button class="auth-tab active" onclick="showAuthTab('login')">登录</button>
    <button class="auth-tab" onclick="showAuthTab('register')">注册</button>
  </div>
  <div class="auth-box" id="loginBox">
    <h2>代理登录</h2>
    <p>使用代理账号登录后台</p>
    <input type="text" id="loginUsername" placeholder="用户名" autofocus onkeydown="if(event.key==='Enter')doLogin()">
    <input type="password" id="loginPassword" placeholder="密码" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn btn-primary btn-block" onclick="doLogin()">登 录</button>
    <div class="auth-error" id="loginError"></div>
  </div>
  <div class="auth-box" id="registerBox" style="display:none">
    <h2>注册代理账号</h2>
    <p>使用邀请码注册代理账号</p>
    <input type="text" id="regUsername" placeholder="用户名 (3-20位字母数字下划线)" onkeydown="if(event.key==='Enter')doRegister()">
    <input type="password" id="regPassword" placeholder="密码 (至少6位)" onkeydown="if(event.key==='Enter')doRegister()">
    <input type="text" id="regInviteCode" placeholder="邀请码" onkeydown="if(event.key==='Enter')doRegister()">
    <input type="password" id="regPassword2" placeholder="确认密码" onkeydown="if(event.key==='Enter')doRegister()">
    <button class="btn btn-primary btn-block" onclick="doRegister()">注 册</button>
    <div class="auth-error" id="registerError"></div>
  </div>
  <div style="color:var(--text-3);font-size:11px;letter-spacing:0.5px">灵桥 代理后台 v1.0</div>
</div>

<div class="app" id="app">
  <div class="sidebar">
    <div class="sidebar-brand">
      <h2>灵桥</h2>
      <div class="ver">代理后台 v1.0</div>
      <div class="agent-name" id="agentNameDisplay"></div>
    </div>
    <div class="sidebar-nav">
      <div class="nav-item active" onclick="switchPage('dashboard',this)"><span class="icon">&#x1F4CA;</span> <span>仪表盘</span></div>
      <div class="nav-item" onclick="switchPage('cards',this)"><span class="icon">&#x1F4B3;</span> <span>我的卡密</span></div>
      <div class="nav-item" onclick="switchPage('password',this)"><span class="icon">&#x1F512;</span> <span>修改密码</span></div>
    </div>
    <div class="sidebar-footer">
      <span class="status-dot" id="serverDot"></span>
      <span class="status-text" id="serverStatusText">服务器运行中</span>
      <div style="margin-top:6px;font-size:10px;color:var(--text-3)">Ctrl+K 搜索 &middot; Esc 关闭弹窗</div>
      <a class="logout" onclick="goAuth()">退出登录</a>
    </div>
  </div>
  <div class="main">
    <div class="page active" id="page-dashboard">
      <div class="page-header"><h2>仪表盘</h2><p>我的卡密概览</p></div>
      <div class="stats-grid" id="dashboardStats"></div>
    </div>
    <div class="page" id="page-cards">
      <div class="page-header"><h2>我的卡密</h2><p>生成和管理你的卡密</p></div>
      <div class="action-bar">
        <button class="btn btn-primary" onclick="showGenerateModal()">+ 生成卡密</button>
        <button class="btn btn-primary" onclick="showBatchGenerateModal()">++ 批量生成</button>
        <div class="spacer"></div>
        <select id="cardStatusFilter" onchange="renderCards()" style="width:110px">
          <option value="">全部状态</option><option value="active">有效</option><option value="disabled">已禁用</option><option value="expired">已过期</option>
        </select>
        <input type="text" id="cardSearch" placeholder="搜索卡密..." oninput="renderCards()" style="width:160px">
      </div>
      <div class="table-wrap">
        <table><thead><tr><th>卡密</th><th>状态</th><th>最大会话</th><th>到期时间</th><th>绑定机器</th><th>备注</th></tr></thead><tbody id="cardsTable"></tbody></table>
      </div>
    </div>
    <div class="page" id="page-password">
      <div class="page-header"><h2>修改密码</h2><p>修改你的代理账号密码</p></div>
      <div class="pwd-section">
        <div style="font-weight:600;margin-bottom:16px">修改登录密码</div>
        <label style="display:block;margin-bottom:5px;color:var(--text-2);font-size:12px;font-weight:600">当前密码</label>
        <input type="password" id="oldPassword" placeholder="输入当前密码" style="width:100%;padding:10px 12px;margin-bottom:12px;border-radius:8px;border:1px solid var(--border);background:rgba(0,0,0,0.2);color:var(--text);font-size:13px" />
        <label style="display:block;margin-bottom:5px;color:var(--text-2);font-size:12px;font-weight:600">新密码</label>
        <input type="password" id="newPassword" placeholder="输入新密码 (至少6位)" style="width:100%;padding:10px 12px;margin-bottom:12px;border-radius:8px;border:1px solid var(--border);background:rgba(0,0,0,0.2);color:var(--text);font-size:13px" />
        <label style="display:block;margin-bottom:5px;color:var(--text-2);font-size:12px;font-weight:600">确认新密码</label>
        <input type="password" id="confirmPassword" placeholder="再次输入新密码" style="width:100%;padding:10px 12px;margin-bottom:16px;border-radius:8px;border:1px solid var(--border);background:rgba(0,0,0,0.2);color:var(--text);font-size:13px" />
        <button class="btn btn-primary" onclick="changePassword()">修改密码</button>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="generateModal">
  <div class="modal">
    <h3>生成卡密</h3>
    <label>有效时长（小时）</label><input type="number" id="genDuration" value="720">
    <label>最大同时在线数 (最多5)</label><input type="number" id="genMaxSessions" value="1" min="1" max="5">
    <label>备注（可选）</label><input type="text" id="genNote" placeholder="例如：客户张三">
    <div class="modal-btns">
      <button class="btn btn-primary" onclick="generateCard()">确认生成</button>
      <button class="btn btn-ghost" onclick="closeModal('generateModal')">取消</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="batchGenerateModal">
  <div class="modal">
    <h3>批量生成卡密</h3>
    <label>生成数量 (最多50)</label><input type="number" id="batchCount" value="10" min="1" max="50">
    <label>有效时长（小时）</label><input type="number" id="batchDuration" value="720">
    <label>最大同时在线数 (最多5)</label><input type="number" id="batchMaxSessions" value="1" min="1" max="5">
    <label>备注（可选）</label><input type="text" id="batchNote" placeholder="例如：批量30天卡">
    <div class="modal-btns">
      <button class="btn btn-primary" onclick="batchGenerateCards()">批量生成</button>
      <button class="btn btn-ghost" onclick="closeModal('batchGenerateModal')">取消</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let _agentID = localStorage.getItem('agentID') || '';
let _agentUser = localStorage.getItem('agentUser') || '';
let _cards = [];

// ── XSS Protection ──────────────────────────────────────────────
function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ── Clipboard ───────────────────────────────────────────────────
function copyToClipboard(text, label) {
  navigator.clipboard.writeText(text).then(() => {
    showToast((label || '已复制') + ': ' + text);
  }).catch(() => showToast(text));
}

// ── Toast ───────────────────────────────────────────────────────
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + (type || 'success') + ' show';
  setTimeout(() => t.className = 'toast', 3500);
}

// ── Keyboard Shortcuts ──────────────────────────────────────────
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
    e.preventDefault();
    const searchInput = document.querySelector('.page.active input[type="text"]');
    if (searchInput) { searchInput.focus(); searchInput.select(); }
  }
  if (e.key === 'Escape') {
    document.querySelectorAll('.modal-overlay.show').forEach(m => m.classList.remove('show'));
  }
});
function showAuthTab(tab) {
  document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
  if (tab === 'login') { document.querySelectorAll('.auth-tab')[0].classList.add('active'); document.getElementById('loginBox').style.display='block'; document.getElementById('registerBox').style.display='none'; }
  else { document.querySelectorAll('.auth-tab')[1].classList.add('active'); document.getElementById('loginBox').style.display='none'; document.getElementById('registerBox').style.display='block'; }
}
function goAuth() {
  _agentID=''; _agentUser='';
  localStorage.removeItem('agentID'); localStorage.removeItem('agentUser');
  document.getElementById('authScreen').style.display='flex';
  document.getElementById('app').classList.remove('show');
}
async function api(path, body) {
  const opts = { headers: {} };
  if (body) { opts.method='POST'; opts.headers['Content-Type']='application/json'; opts.body=JSON.stringify(body); }
  const res = await fetch(path, opts);
  const text = await res.text();
  try { const data = JSON.parse(text); if (data.status==='error') throw new Error(data.message); return data; }
  catch (e) { if (e instanceof SyntaxError) throw new Error('服务器响应异常'); throw e; }
}
async function agentApi(path, body) {
  const opts = { credentials: 'include', headers: {} };
  if (body) { opts.method='POST'; opts.headers['Content-Type']='application/json'; opts.body=JSON.stringify(body); }
  const res = await fetch(path, opts);
  if (res.status===401) { goAuth(); throw new Error('登录已过期，请重新登录'); }
  const text = await res.text();
  try { const data = JSON.parse(text); if (data.status==='error') throw new Error(data.message); return data; }
  catch (e) { if (e instanceof SyntaxError) throw new Error('服务器响应异常'); throw e; }
}
async function doLogin() {
  const user = document.getElementById('loginUsername').value.trim();
  const pw = document.getElementById('loginPassword').value;
  if (!user || !pw) return;
  try {
    const data = await api('/api/login', { username: user, password: pw });
    _agentID = data.agent_id; _agentUser = data.username;
    localStorage.setItem('agentID', _agentID); localStorage.setItem('agentUser', _agentUser);
    document.getElementById('authScreen').style.display='none';
    document.getElementById('app').classList.add('show');
    document.getElementById('agentNameDisplay').textContent = '@' + _agentUser;
    loadDashboard();
  } catch (e) { const el = document.getElementById('loginError'); el.textContent = e.message; el.style.display = 'block'; }
}
async function doRegister() {
  const user = document.getElementById('regUsername').value.trim();
  const pw = document.getElementById('regPassword').value;
  const pw2 = document.getElementById('regPassword2').value;
  const errEl = document.getElementById('registerError');
  if (!user || !pw) return;
  if (pw !== pw2) { errEl.textContent='两次输入的密码不一致'; errEl.style.display='block'; return; }
  try {
    const inviteCode = document.getElementById('regInviteCode').value.trim(); if (!inviteCode) { errEl.textContent='请输入邀请码'; errEl.style.display='block'; return; } await api('/api/register', { username: user, password: pw, invite_code: inviteCode });
    showToast('注册成功，请登录'); showAuthTab('login');
    document.getElementById('loginUsername').value = user;
    errEl.style.display='none';
  } catch (e) { errEl.textContent = e.message; errEl.style.display = 'block'; }
}
async function checkAuth() {
  if (!_agentUser) return;
  try {
    await agentApi('/api/dashboard');
    document.getElementById('authScreen').style.display='none';
    document.getElementById('app').classList.add('show');
    document.getElementById('agentNameDisplay').textContent = '@' + _agentUser;
    loadDashboard();
  } catch (e) {}
}
checkAuth();
function switchPage(name, el) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  if (el) el.classList.add('active');
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  if (name==='dashboard') loadDashboard();
  if (name==='cards') loadCards();
  if (window.innerWidth<=768) toggleSidebar();
}
function toggleSidebar() { document.querySelector('.sidebar').classList.toggle('open'); document.getElementById('sidebarOverlay').classList.toggle('show'); }
function closeModal(id) { document.getElementById(id).classList.remove('show'); }

async function loadDashboard() {
  try {
    const data = await agentApi('/api/dashboard');
    document.getElementById('dashboardStats').innerHTML = `
      <div class="stat-card"><div class="label">我的卡密</div><div class="value accent">${data.total_cards}</div></div>
      <div class="stat-card"><div class="label">有效卡密</div><div class="value success">${data.active_cards}</div></div>
      <div class="stat-card"><div class="label">已过期</div><div class="value danger">${data.expired_cards}</div></div>`;
  } catch (e) { showToast(e.message, 'error'); }
}
async function loadCards() {
  try { const data = await agentApi('/api/cards'); _cards = data.cards || []; renderCards(); }
  catch (e) { showToast(e.message, 'error'); }
}
function renderCards() {
  const q = (document.getElementById('cardSearch')?.value||'').toUpperCase();
  const sf = document.getElementById('cardStatusFilter')?.value||'';
  const cards = _cards.filter(c => {
    if (sf && c.status !== sf) return false;
    if (q && !c.code.includes(q) && !(c.note||'').toUpperCase().includes(q)) return false;
    return true;
  });
  const tbody = document.getElementById('cardsTable');
  if (!cards.length) { tbody.innerHTML='<tr><td colspan="6"><div class="empty-state"><div class="icon">&#x1F4ED;</div>暂无卡密，点击上方按钮生成</div></td></tr>'; return; }
  tbody.innerHTML = cards.map(c => {
    const isActive = c.status==='active' && new Date(c.expires_at)>new Date();
    const sc = isActive?'badge-active':c.status==='disabled'?'badge-disabled':'badge-expired';
    const st = isActive?'有效':c.status==='disabled'?'已禁用':'已过期';
    const code = esc(c.code);
    const bound = c.machine_id?`<span class="mono" title="${esc(c.machine_id)}">${esc(c.machine_id.substring(0,12))}...</span>`:'<span style="color:var(--text-3)">未绑定</span>';
    return `<tr><td><span class="mono" style="cursor:pointer" title="点击复制" onclick="copyToClipboard('${code}','卡密')">${code}</span></td><td><span class="badge ${sc}">${st}</span></td><td>${c.max_sessions||1}</td><td>${new Date(c.expires_at).toLocaleString('zh-CN')}</td><td>${bound}</td><td>${esc(c.note)||'-'}</td></tr>`;
  }).join('');
}
function showGenerateModal() { document.getElementById('generateModal').classList.add('show'); }
function showBatchGenerateModal() { document.getElementById('batchGenerateModal').classList.add('show'); }
async function generateCard() {
  const d=parseInt(document.getElementById('genDuration').value)||720;
  const ms=parseInt(document.getElementById('genMaxSessions').value)||1;
  const note=document.getElementById('genNote').value;
  try {
    const data = await agentApi('/api/card/generate', {duration_hours:d, max_sessions:ms, note});
    navigator.clipboard.writeText(data.card.code).then(()=>showToast('卡密已复制: '+data.card.code)).catch(()=>showToast('卡密: '+data.card.code));
    closeModal('generateModal'); loadCards();
  } catch (e) { showToast(e.message, 'error'); }
}
async function batchGenerateCards() {
  const count=parseInt(document.getElementById('batchCount').value)||10;
  const d=parseInt(document.getElementById('batchDuration').value)||720;
  const ms=parseInt(document.getElementById('batchMaxSessions').value)||1;
  const note=document.getElementById('batchNote').value;
  try {
    const data = await agentApi('/api/card/batch-generate', {count, duration_hours:d, max_sessions:ms, note});
    const codes = data.cards.map(c=>c.code).join('\n');
    navigator.clipboard.writeText(codes).then(()=>showToast('已生成 '+data.count+' 张卡密，已复制到剪贴板')).catch(()=>showToast('已生成 '+data.count+' 张卡密'));
    closeModal('batchGenerateModal'); loadCards();
  } catch (e) { showToast(e.message, 'error'); }
}
async function changePassword() {
  const oldPw=document.getElementById('oldPassword').value;
  const newPw=document.getElementById('newPassword').value;
  const confirmPw=document.getElementById('confirmPassword').value;
  if (!oldPw||!newPw) { showToast('请填写完整','warning'); return; }
  if (newPw!==confirmPw) { showToast('两次输入的新密码不一致','warning'); return; }
  if (newPw.length<6) { showToast('新密码长度不能少于6位','warning'); return; }
  try {
    await agentApi('/api/password', {old_password:oldPw, new_password:newPw});
    showToast('密码修改成功，请重新登录');
    document.getElementById('oldPassword').value='';
    document.getElementById('newPassword').value='';
    document.getElementById('confirmPassword').value='';
    setTimeout(()=>goAuth(), 1500);
  } catch (e) { showToast(e.message, 'error'); }
}
setInterval(()=>{ if (document.getElementById('page-dashboard').classList.contains('active')) loadDashboard(); }, 30000);
setInterval(async()=>{ try { await fetch('/api/health'); document.getElementById('serverDot').style.background='var(--success)'; document.getElementById('serverStatusText').textContent='服务器运行中'; } catch(e) { document.getElementById('serverDot').style.background='var(--danger)'; document.getElementById('serverStatusText').textContent='服务器离线'; } }, 30000);
</script>
</body>
</html>
