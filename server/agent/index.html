<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>灵桥 代理面板</title>
<link rel="stylesheet" href="/agent/static/css/style.css">
</head>
<body>

<div class="mobile-header" id="mobileHeader">
  <button class="hamburger" onclick="toggleSidebar()">&#9776;</button>
  <span class="title">灵桥 代理后台</span>
</div>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<div class="auth-screen" id="authScreen">
  <div class="auth-brand">LINGQIAO</div>
  <div class="auth-tabs">
    <button class="auth-tab active" onclick="showAuthTab('login')">登录</button>
    <button class="auth-tab" onclick="showAuthTab('register')">注册</button>
  </div>
  <div class="auth-box" id="loginBox">
    <h2>代理登录</h2>
    <p>使用代理账号登录后台</p>
    <input type="text" id="loginUsername" placeholder="用户名" autofocus onkeydown="if(event.key==='Enter')doLogin()">
    <input type="password" id="loginPassword" placeholder="密码" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn btn-primary btn-block" onclick="doLogin()">登 录</button>
    <div class="auth-error" id="loginError"></div>
  </div>
  <div class="auth-box" id="registerBox" style="display:none">
    <h2>注册代理账号</h2>
    <p>使用邀请码注册代理账号</p>
    <input type="text" id="regUsername" placeholder="用户名 (3-20位字母数字下划线)" onkeydown="if(event.key==='Enter')doRegister()">
    <input type="password" id="regPassword" placeholder="密码 (至少6位)" onkeydown="if(event.key==='Enter')doRegister()">
    <input type="text" id="regInviteCode" placeholder="邀请码" onkeydown="if(event.key==='Enter')doRegister()">
    <input type="password" id="regPassword2" placeholder="确认密码" onkeydown="if(event.key==='Enter')doRegister()">
    <button class="btn btn-primary btn-block" onclick="doRegister()">注 册</button>
    <div class="auth-error" id="registerError"></div>
  </div>
  <div style="color:var(--text-3);font-size:11px;letter-spacing:0.5px">灵桥 代理后台 v1.0</div>
</div>

<div class="app" id="app">
  <div class="sidebar">
    <div class="sidebar-brand">
      <h2>灵桥</h2>
      <div class="ver">代理后台 v1.0</div>
      <div class="agent-name" id="agentNameDisplay"></div>
    </div>
    <div class="sidebar-nav">
      <div class="nav-item active" onclick="switchPage('dashboard',this)"><span class="icon">&#x1F4CA;</span> <span>仪表盘</span></div>
      <div class="nav-item" onclick="switchPage('cards',this)"><span class="icon">&#x1F4B3;</span> <span>我的卡密</span></div>
      <div class="nav-item" onclick="switchPage('password',this)"><span class="icon">&#x1F512;</span> <span>修改密码</span></div>
    </div>
    <div class="sidebar-footer">
      <span class="status-dot" id="serverDot"></span>
      <span class="status-text" id="serverStatusText">服务器运行中</span>
      <div style="margin-top:6px;font-size:10px;color:var(--text-3)">Ctrl+K 搜索 &middot; Esc 关闭弹窗</div>
      <a class="logout" onclick="goAuth()">退出登录</a>
    </div>
  </div>
  <div class="main">
    <div class="page active" id="page-dashboard">
      <div class="page-header"><h2>仪表盘</h2><p>我的卡密概览</p></div>
      <div class="stats-grid" id="dashboardStats"></div>
    </div>
    <div class="page" id="page-cards">
      <div class="page-header"><h2>我的卡密</h2><p>生成和管理你的卡密</p></div>
      <div class="action-bar">
        <button class="btn btn-primary" onclick="showGenerateModal()">+ 生成卡密</button>
        <button class="btn btn-primary" onclick="showBatchGenerateModal()">++ 批量生成</button>
        <div class="spacer"></div>
        <select id="cardStatusFilter" onchange="renderCards()" style="width:110px">
          <option value="">全部状态</option><option value="active">有效</option><option value="disabled">已禁用</option><option value="expired">已过期</option>
        </select>
        <input type="text" id="cardSearch" placeholder="搜索卡密..." oninput="renderCards()" style="width:160px">
      </div>
      <div class="table-wrap">
        <table><thead><tr><th>卡密</th><th>状态</th><th>最大会话</th><th>到期时间</th><th>绑定机器</th><th>备注</th></tr></thead><tbody id="cardsTable"></tbody></table>
      </div>
    </div>
    <div class="page" id="page-password">
      <div class="page-header"><h2>修改密码</h2><p>修改你的代理账号密码</p></div>
      <div class="pwd-section">
        <div style="font-weight:600;margin-bottom:16px">修改登录密码</div>
        <label style="display:block;margin-bottom:5px;color:var(--text-2);font-size:12px;font-weight:600">当前密码</label>
        <input type="password" id="oldPassword" placeholder="输入当前密码" style="width:100%;padding:10px 12px;margin-bottom:12px;border-radius:8px;border:1px solid var(--border);background:rgba(0,0,0,0.2);color:var(--text);font-size:13px" />
        <label style="display:block;margin-bottom:5px;color:var(--text-2);font-size:12px;font-weight:600">新密码</label>
        <input type="password" id="newPassword" placeholder="输入新密码 (至少6位)" style="width:100%;padding:10px 12px;margin-bottom:12px;border-radius:8px;border:1px solid var(--border);background:rgba(0,0,0,0.2);color:var(--text);font-size:13px" />
        <label style="display:block;margin-bottom:5px;color:var(--text-2);font-size:12px;font-weight:600">确认新密码</label>
        <input type="password" id="confirmPassword" placeholder="再次输入新密码" style="width:100%;padding:10px 12px;margin-bottom:16px;border-radius:8px;border:1px solid var(--border);background:rgba(0,0,0,0.2);color:var(--text);font-size:13px" />
        <button class="btn btn-primary" onclick="changePassword()">修改密码</button>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="generateModal">
  <div class="modal">
    <h3>生成卡密</h3>
    <label>有效时长（小时）</label><input type="number" id="genDuration" value="720">
    <label>最大同时在线数 (最多5)</label><input type="number" id="genMaxSessions" value="1" min="1" max="5">
    <label>备注（可选）</label><input type="text" id="genNote" placeholder="例如：客户张三">
    <div class="modal-btns">
      <button class="btn btn-primary" onclick="generateCard()">确认生成</button>
      <button class="btn btn-ghost" onclick="closeModal('generateModal')">取消</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="batchGenerateModal">
  <div class="modal">
    <h3>批量生成卡密</h3>
    <label>生成数量 (最多50)</label><input type="number" id="batchCount" value="10" min="1" max="50">
    <label>有效时长（小时）</label><input type="number" id="batchDuration" value="720">
    <label>最大同时在线数 (最多5)</label><input type="number" id="batchMaxSessions" value="1" min="1" max="5">
    <label>备注（可选）</label><input type="text" id="batchNote" placeholder="例如：批量30天卡">
    <div class="modal-btns">
      <button class="btn btn-primary" onclick="batchGenerateCards()">批量生成</button>
      <button class="btn btn-ghost" onclick="closeModal('batchGenerateModal')">取消</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>


<script src="/agent/static/js/app.js"></script>
</body>
</html>
